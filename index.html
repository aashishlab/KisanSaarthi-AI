<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KisanSaarthi AI</title>
    <meta name="description" content="KisanSaarthi AI Application" />
    <meta name="author" content="KisanSaarthi AI" />

    <meta property="og:title" content="KisanSaarthi AI" />
    <meta property="og:description" content="KisanSaarthi AI Application" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kisansaarthi" />

    <!-- AI Loading Screen Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap');

      #ai-loader-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(180deg, hsl(150 10% 97%) 0%, hsl(152 68% 96%) 100%);
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
      }

      #ai-loader-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .animation-container {
        position: relative;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }

      .glow-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: hsl(122 46% 33%);
        border-bottom-color: hsl(122 46% 33%);
        animation: spin 1.5s linear infinite;
        box-shadow: 0 0 15px hsl(122 46% 33% / 0.2);
      }

      .glow-ring.inner {
        width: 65%;
        height: 65%;
        border-color: transparent;
        border-right-color: hsl(122 38% 57%);
        border-left-color: hsl(122 38% 57%);
        animation: spin-reverse 1.2s linear infinite;
        box-shadow: 0 0 10px hsl(122 38% 57% / 0.2);
      }

      .core-dot {
        width: 22px;
        height: 22px;
        background-color: hsl(122 46% 33%);
        border-radius: 50%;
        box-shadow: 0 0 20px 4px hsl(122 46% 33% / 0.4);
        animation: pulse-core 1.5s ease-in-out infinite;
      }

      .loader-title {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 2.25rem;
        font-weight: 700;
        color: hsl(220 13% 18%);
        margin: 0;
        letter-spacing: -0.02em;
      }

      .loader-subtitle {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 1rem;
        color: hsl(220 9% 46%);
        margin-top: 8px;
        animation: pulse-text 2s ease-in-out infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes spin-reverse {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(-360deg); }
      }

      @keyframes pulse-core {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.2); opacity: 1; }
      }

      @keyframes pulse-text {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      @media (max-width: 640px) {
        .loader-title { font-size: 1.75rem; }
        .animation-container { width: 80px; height: 80px; margin-bottom: 20px; }
      }
    </style>
  </head>

  <body>
    <!-- AI Loading Screen -->
    <div id="ai-loader-overlay">
      <div class="loader-content">
        <div class="animation-container">
          <div class="glow-ring"></div>
          <div class="glow-ring inner"></div>
          <div class="core-dot"></div>
        </div>
        <h1 class="loader-title">Kisan Saarthi AI</h1>
        <p class="loader-subtitle">Initializing System...</p>
      </div>
    </div>

    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById("ai-loader-overlay");
        setTimeout(() => {
          loader.classList.add("fade-out");
          setTimeout(() => {
            if (loader) loader.remove();
          }, 600);
        }, 2500); // 2.5 seconds loading view
      });
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
